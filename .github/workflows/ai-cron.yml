name: AI 연구 자료 자동 수집 Cron

on:
  # 6시간마다 자동 실행 (UTC 기준: 0, 6, 12, 18시 → KST 9, 15, 21, 03시)
  schedule:
  #  - cron: '0 */6 * * *'
  # 수동 즉시 실행 (Actions 탭에서 클릭)
  workflow_dispatch:

jobs:
  collect-research:
    runs-on: ubuntu-latest
    steps:
      - name: AI 자료 수집 트리거 호출
        run: |
          echo "📡 Firebase Cloud Function 호출 시작..."
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "https://us-central1-ai-research-agent-3cc69.cloudfunctions.net/scheduledResearchAgent")
          
          echo "HTTP 응답 코드: $HTTP_STATUS"
          echo "응답 내용:"
          cat /tmp/response.txt
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ 자료 수집 성공!"
          else
            echo "❌ 수집 실패: HTTP $HTTP_STATUS"
            exit 1
          fi
